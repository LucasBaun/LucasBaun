name: Update Spotify Now Playing

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/spotify.yml"
      - ".github/scripts/update_spotify.py"

concurrency:
  group: spotify-readme
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update Spotify section in README
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: python .github/scripts/update_spotify.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/spotify-card.svg
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update Spotify now playing"

          for attempt in 1 2 3 4 5; do
            echo "Push attempt $attempt..."
            git pull --rebase origin main
            if git push origin main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push rejected, retrying after rebase..."
            sleep 5
          done

          echo "Push failed after multiple attempts."
          exit 1
